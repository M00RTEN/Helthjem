<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mine Pakker</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 500px; margin: auto; padding: 20px; background: #f4f7f6; }
        .header { text-align: center; margin-bottom: 20px; }
        .input-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button.add { width: 100%; padding: 12px; background: #ff5a00; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; border-left: 6px solid #ff5a00; }
        .nickname { font-weight: bold; font-size: 18px; margin-bottom: 5px; color: #333; }
        .track-nr { font-size: 13px; color: #888; margin-bottom: 12px; }
        .btn-track { display: block; text-align: center; background: #007bff; color: white; text-decoration: none; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: bold; }
        .delete-btn { position: absolute; top: 10px; right: 10px; color: #ccc; cursor: pointer; border: none; background: none; font-size: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Mine Pakker 📦</h1>
    </div>

    <div class="input-box">
        <input type="text" id="nickInput" placeholder="Navn på pakken (f.eks. Jakke)">
        <input type="text" id="trackInput" placeholder="Sporingsnummer...">
        <button class="add" onclick="addPackage()">Legg til i listen</button>
    </div>

    <div id="packageList"></div>

    <script>
        let packages = JSON.parse(localStorage.getItem('hhPackages')) || [];

        function render() {
            const list = document.getElementById('packageList');
            list.innerHTML = '';
            
            packages.forEach((p, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <button class="delete-btn" onclick="removePackage(${index})">×</button>
                    <div class="nickname">${p.nick || 'Pakke'}</div>
                    <div class="track-nr"># ${p.nr}</div>
                    <a href="https://helthjem.no/sporing/${p.nr}" target="_blank" class="btn-track">Sjekk status hos HeltHjem</a>
                `;
                list.appendChild(card);
            });
            localStorage.setItem('hhPackages', JSON.stringify(packages));
        }

        function addPackage() {
            const nick = document.getElementById('nickInput').value;
            const nr = document.getElementById('trackInput').value.trim();
            
            if (nr) {
                packages.unshift({ nick, nr });
                document.getElementById('nickInput').value = '';
                document.getElementById('trackInput').value = '';
                render();
            }
        }

        function removePackage(index) {
            packages.splice(index, 1);
            render();
        }

        render();
    </script>
</body>
</html>
