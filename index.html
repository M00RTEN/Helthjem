<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Sporing</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 600px; margin: auto; padding: 15px; background: #f0f2f5; }
        .input-box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button.add { width: 100%; padding: 12px; background: #ff5a00; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .card { background: white; border-radius: 12px; margin-bottom: 15px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card-header { padding: 12px; display: flex; justify-content: space-between; align-items: center; background: #fff; cursor: pointer; }
        .nick { font-weight: bold; font-size: 16px; }
        .nr { font-size: 12px; color: #888; }
        /* Dette er "vinduet" som viser HeltHjem */
        .track-frame { width: 100%; height: 500px; border: none; display: none; border-top: 1px solid #eee; }
        .active .track-frame { display: block; }
        .delete { color: #ccc; border: none; background: none; font-size: 18px; padding: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="input-box">
        <input type="text" id="nickInput" placeholder="Hva er i pakken? (f.eks. Sko)">
        <input type="text" id="trackInput" placeholder="Sporingsnummer...">
        <button class="add" onclick="addPackage()">Legg til pakke</button>
    </div>

    <div id="packageList"></div>

    <script>
        let packages = JSON.parse(localStorage.getItem('myIframeTracks')) || [];

        function render() {
            const list = document.getElementById('packageList');
            list.innerHTML = '';
            
            packages.forEach((p, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header" onclick="this.parentElement.classList.toggle('active')">
                        <div>
                            <div class="nick">${p.nick || 'Pakke'}</div>
                            <div class="nr">${p.nr}</div>
                        </div>
                        <button class="delete" onclick="event.stopPropagation(); removePackage(${index})">×</button>
                    </div>
                    <iframe class="track-frame" src="https://helthjem.no/sporing/${p.nr}" loading="lazy"></iframe>
                `;
                list.appendChild(card);
            });
            localStorage.setItem('myIframeTracks', JSON.stringify(packages));
        }

        function addPackage() {
            const nick = document.getElementById('nickInput').value;
            const nr = document.getElementById('trackInput').value.trim();
            if (nr) {
                packages.unshift({ nick, nr });
                document.getElementById('nickInput').value = '';
                document.getElementById('trackInput').value = '';
                render();
            }
        }

        function removePackage(index) {
            if(confirm("Slette denne?")) {
                packages.splice(index, 1);
                render();
            }
        }

        render();
    </script>
</body>
</html>
